<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta property="og:title" content="Akeanti's Page">
    <meta property="og:description" content="This is the most satisfying dynamic page you will ever see :)">
    <meta property="og:image" content="https://raw.githubusercontent.com/akeanti/akeanti.github.io/main/pitures/akeanti.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#ffffff">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - Akeanti</title>
    <link rel="icon" href="pitures/web.ico" type="image/x-icon">
<style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            color: #fff;
            background: #000;
            overflow-x: hidden;
            overflow-y: auto;
            position: relative;
            scroll-behavior: smooth;
        }

        nav {
            width: 100%;
            background-color: rgba(0, 0, 0, 0.7);
            padding: 10px 20px;
            position: fixed;
            top: 0;
            display: flex;
            align-items: center;
            z-index: 1000;
            height: 60px; /* Match height to the index file */
        }

        nav .logo {
            margin-right: 20px; /* Space between logo and menu */
            display: flex;
            align-items: center;
        }

        nav .logo img {
            height: 40px; /* Ensure logo size */
        }

        nav ul {
            list-style: none;
            padding: 0;
            margin: 0;
            display: flex;
            align-items: center;
        }

        nav ul li {
            margin: 0 15px;
        }

        nav ul li a {
            text-decoration: none;
            color: white;
            font-weight: bold;
            display: flex;
            align-items: center; /* Center text vertically */
            height: 40px; /* Ensure link height matches logo */
        }

        nav ul li a:hover {
            text-decoration: underline;
        }

        a {
            color: #23a6d5;
        }

        a:hover {
            color: #00d9ff;
        }

        .content {
            padding: 20px;
            margin-top: 60px; /* Adjust based on header height */
            text-align: center;
        }

        h1 {
            margin-top: 80px; /* Margin for spacing from the fixed nav */
            font-size: 2em;
            color: #fff;
        }

        .button-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
            margin-top: 40px;
        }

        .button {
            padding: 15px 30px;
            font-size: 1.2em;
            font-weight: bold;
            color: white;
            text-transform: uppercase;
            border: 2px solid #23a6d5;
            background: transparent;
            cursor: pointer;
            transition: all 0.4s;
            position: relative;
            overflow: hidden;
        }

        .button::before {
            content: '';
            position: absolute;
            top: 0;
            left: 50%;
            width: 0;
            height: 100%;
            background: #23a6d5;
            transition: all 0.4s;
            z-index: -1;
        }

        .button:hover::before {
            left: 0;
            width: 100%;
        }

        .button:hover {
            color: white;
        }

        /* Shooting Stars */
        .star {
            position: absolute;
            width: 3px;
            height: 3px;
            background: white;
            border-radius: 50%;
            box-shadow: 0 0 10px 5px rgba(255, 255, 255, 0.8);
            animation: shoot linear infinite;
            transition: box-shadow 0.5s;
        }

        @keyframes shoot {
            from {
                transform: translateY(0) translateX(0);
                opacity: 1;
                box-shadow: 0 0 10px 5px rgba(255, 255, 255, 0.8);
            }
            to {
                transform: translateY(-1000px) translateX(1000px);
                opacity: 0;
                box-shadow: 0 0 0 rgba(255, 255, 255, 0);
            }
        }

        @keyframes moveStar {
            0% {
                transform: translateY(0) translateX(0);
            }
            100% {
                transform: translateY(calc(var(--y) * 1px)) translateX(calc(var(--x) * 1px));
            }
        }

        /* Stars Container */
        #stars-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
            z-index: 0; /* Make sure stars stay behind content */
        }
    </style>
</head>
<body>
    <nav>
        <div class="logo">
            <a href="index.html"><img src="pitures/menu.png" alr="Logo"></a>
        </div>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="project.html">Projects</a></li>
            <li><a href="blog.html">Blogs</a></li>
            <li><a href="contact.html">Contact</a></li>
            <li><a href="cat.html">Cat Test</a></li>
            <li><a href="sponsors.html">Sponsors</a></li>
        </ul>
    </nav>
    <div class="content">
        <h1>My Contacts</h1>
        <p>Need any help? Or maybe want rate this page, feel free to dm me! & join my discord server if you're feeling experimental.</p>
        <div class="button-container">
            <button onclick="document.location='https://discord.gg/A2rQsnQMvy'" class="button">Discord Server</button>
            <button onclick="document.location='https://github.com/akeanti'" class="button">GitHub</button>
            <button onclick="document.location='https://mail.google.com/mail/?view=cm&fs=1&to=akeantie@gmail.com&su=SUBJECT&body=BODY'" class="button">Email</button>
            <button onclick="document.location='https://www.instagram.com/akeantie/'" class="button">Instagram</button>
        </div>
    </div>

    <!-- Shooting Stars Container -->
    <div id="stars-container"></div>

    <script>
        const numberOfStars = 100;
        const starsContainer = document.getElementById('stars-container');

        for (let i = 0; i < numberOfStars; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            star.style.top = `${Math.random() * 100}vh`;
            star.style.left = `${Math.random() * 100}vw`;
            star.style.animationDuration = `${Math.random() * 5 + 5}s`; // Faster movement
            star.style.animationDelay = `${Math.random() * 10}s`;
            starsContainer.appendChild(star);
        }

        document.addEventListener('mousemove', (e) => {
            const stars = document.querySelectorAll('.star');
            stars.forEach(star => {
                const speedMultiplier = 10; // Increased sensitivity to mouse movement
                star.style.setProperty('--x', (e.clientX - window.innerWidth / 2) / (20 / speedMultiplier));
                star.style.setProperty('--y', (e.clientY - window.innerHeight / 2) / (20 / speedMultiplier));
                star.style.animationName = 'shoot, moveStar';
                star.style.boxShadow = `0 0 20px 10px rgba(255, 255, 255, 0.8)`; // Enhanced trail effect
            });
        });
    </script>
</body>
</html>

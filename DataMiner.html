<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta property="og:title" content="Akeanti's Page">
    <meta property="og:description" content="This is the most satisfying dynamic page you will ever see :)">
    <meta property="og:image" content="https://raw.githubusercontent.com/akeanti/akeanti.github.io/main/pitures/akeanti.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#ffffff">
    <title>Blogs - Akeanti</title>
    <link rel="icon" href="pitures/web.ico" type="image/x-icon">
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            color: #fff;
            background: #000;
            overflow-x: hidden;
            overflow-y: auto;
            position: relative;
            scroll-behavior: smooth;
        }

        nav {
            width: 100%;
            background-color: rgba(0, 0, 0, 0.7);
            padding: 10px 20px;
            position: fixed;
            top: 0;
            display: flex;
            align-items: center;
            z-index: 1000;
            height: 60px;
        }

        nav .logo {
            margin-right: 20px;
            display: flex;
            align-items: center;
        }

        nav .logo img {
            height: 40px;
        }

        nav ul {
            list-style: none;
            padding: 0;
            margin: 0;
            display: flex;
            align-items: center;
        }

        nav ul li {
            margin: 0 15px;
        }

        nav ul li a {
            text-decoration: none;
            color: white;
            font-weight: bold;
            display: flex;
            align-items: center;
            height: 40px;
        }

        nav ul li a:hover {
            text-decoration: underline;
        }

        a {
            color: #23a6d5;
        }

        a:hover {
            color: #00d9ff;
        }

        .sidebar {
            width: 200px;
            background-color: rgba(0, 0, 0, 0.7);
            position: fixed;
            top: 60px;
            left: 0;
            bottom: 0;
            padding: 20px;
            overflow-y: auto;
            z-index: 999;
        }

        .sidebar ul {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .sidebar ul li {
            margin-bottom: 10px;
        }

        .sidebar ul li a {
            text-decoration: none;
            color: white;
            font-weight: bold;
            display: block;
            padding: 5px 0;
            cursor: pointer;
        }

        .sidebar ul li a:hover {
            text-decoration: underline;
        }

        .sidebar ul li ul {
            list-style: none;
            padding-left: 15px;
            margin-top: 5px;
            display: none; /* Hide subcategories initially */
        }

        .sidebar ul li.active > ul {
            display: block; /* Show subcategories when parent is active */
        }

        .content {
            padding: 20px;
            margin-top: 60px;
            margin-left: 220px;
            text-align: center;
            position: relative;
        }

        h1 {
            margin-top: 80px;
            font-size: 2em;
            color: #fff;
        }

        /* Sidebar Widgets */
        .sidebar-widget {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 8px;
            padding: 20px;
            margin: 20px auto;
            max-width: 800px;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.5);
        }

        .sidebar-widget h2 {
            color: #23a6d5;
        }

        .popular-post,

        .popular-post h3,
        .latest-update h3 {
            margin-top: 0;
            color: #ffffff;
        }

        .popular-post p,
        .latest-update p {
            line-height: 1.6;
        }

        /* Shooting Stars */
        .star {
            position: absolute;
            width: 3px;
            height: 3px;
            background: white;
            border-radius: 50%;
            box-shadow: 0 0 10px 5px rgba(255, 255, 255, 0.8);
            animation: shoot linear infinite;
            transition: box-shadow 0.5s;
        }

        @keyframes shoot {
            from {
                transform: translateY(0) translateX(0);
                opacity: 1;
                box-shadow: 0 0 10px 5px rgba(255, 255, 255, 0.8);
            }
            to {
                transform: translateY(-1000px) translateX(1000px);
                opacity: 0;
                box-shadow: 0 0 0 rgba(255, 255, 255, 0);
            }
        }

        @keyframes moveStar {
            0% {
                transform: translateY(0) translateX(0);
            }
            100% {
                transform: translateY(calc(var(--y) * 1px)) translateX(calc(var(--x) * 1px));
            }
        }

        #stars-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
            z-index: 0;
        }
    </style>
</head>
<body>
    <nav>
        <div class="logo">
            <a href="index.html"><img src="pitures/menu.png" alt="Logo"></a>
        </div>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="project.html">Projects</a></li>
            <li><a href="blog.html">Blogs</a></li>
            <li><a href="contact.html">Contact</a></li>
            <li><a href="cat.html">Cat Test</a></li>
            <li><a href="sponsors.html">Sponsors</a></li>
        </ul>
    </nav>
    <div class="sidebar">
        <ul>
            <li>
                <a href="#">Celebrety Leaks</a>
                <ul>
                    <li><a href="MrBeast.html">Mr Beast Cencored</a></li>
                </ul>
            </li>
            <li>
                <a href="#">Discord Stuff</a>
                <ul>
                    <li><a href="DataMiner.html">Auto Dataminer</a></li>
                </ul>
            </li>
            <li>
                <a href="#">Code Snippets</a>
                <ul>
                    <li><a href="PyBall.html"> PyBall </a></li>
                </ul>
            </li>
        </ul>
    </div>
    <div class="content">

        <!-- Most Popular Post -->
        <div class="sidebar-widget">
             <h2>The Mr Beast Case</h2>
             <img src="pitures/pppf.png" width="800" height="250" border="0" alt="text describing the image" />
            <div class="popular-post">
                <h3>From a neutral POV.</h3>
                <p>As Soon As I Get More Info</p>
            </div>
        </div>
    </div>

    <!-- Shooting Stars Container -->
    <div id="stars-container"></div>

    <script>
        const numberOfStars = 100;
        const starsContainer = document.getElementById('stars-container');

        for (let i = 0; i < numberOfStars; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            star.style.top = `${Math.random() * 100}vh`;
            star.style.left = `${Math.random() * 100}vw`;
            star.style.animationDuration = `${Math.random() * 5 + 5}s`;
            star.style.animationDelay = `${Math.random() * 10}s`;
            starsContainer.appendChild(star);
        }

        document.addEventListener('mousemove', (e) => {
            const stars = document.querySelectorAll('.star');
            stars.forEach(star => {
                const speedMultiplier = 10;
                star.style.setProperty('--x', (e.clientX - window.innerWidth / 2) / (20 / speedMultiplier));
                star.style.setProperty('--y', (e.clientY - window.innerHeight / 2) / (20 / speedMultiplier));
                star.style.animationName = 'shoot, moveStar';
                star.style.boxShadow = `0 0 20px 10px rgba(255, 255, 255, 0.8)`;
            });
        });

        // JavaScript for collapsible sidebar
        document.querySelectorAll('.sidebar > ul > li > a').forEach(item => {
            item.addEventListener('click', function() {
                // Toggle active class on parent li
                this.parentElement.classList.toggle('active');
            });
        });
    </script>
</body>
</html>
